name: Diagnose Server

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Run diagnostics via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            echo "=== Backend bot endpoint file ==="
            find /var/www/tech_gennis_backend -name '*.py' | xargs grep -l 'student.stats\|student_stats' 2>/dev/null | head -5

            echo "=== Bot router/view content ==="
            BOT_FILE=$(find /var/www/tech_gennis_backend -name '*.py' | xargs grep -l 'student.stats\|student_stats' 2>/dev/null | head -1)
            if [ -n "$BOT_FILE" ]; then cat "$BOT_FILE"; fi

            echo "=== DB tables related to attendance/lessons/points ==="
            cd /var/www/tech_gennis_backend
            grep -r "weekly\|attendance\|lesson_complete\|student_lesson\|activity" --include="*.py" -l | head -5
