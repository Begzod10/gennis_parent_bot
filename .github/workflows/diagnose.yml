name: Diagnose Server

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Patch backend and test via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            BACKEND=/var/www/tech_gennis/backend
            BOT_FILE=$BACKEND/app/api/v1/endpoints/bot_stats.py
            PATCH=/var/www/gennis_parent_bot/scripts/bot_stats_patch.py

            echo "Backup..."
            cp "$BOT_FILE" "${BOT_FILE}.bak"
            echo "Copy patch..."
            cp "$PATCH" "$BOT_FILE"
            echo "Syntax check..."
            cd $BACKEND && venv/bin/python -m py_compile app/api/v1/endpoints/bot_stats.py && echo "OK" || (cp "${BOT_FILE}.bak" "$BOT_FILE" && echo "RESTORED")
            echo "Restart..."
            systemctl restart tech_gennis_backend && sleep 3 && systemctl is-active tech_gennis_backend
            echo "Test..."
            curl -s "http://localhost:8062/api/v1/bot/student-stats/28" | python3 -c "import sys,json; d=json.load(sys.stdin); [print(k+':',d.get(k)) for k in ['daily_points','weekly_points','weekly_rank','monthly_points','weekly_lessons','weekly_exercises']]"
