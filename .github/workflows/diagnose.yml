name: Diagnose Server

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Patch backend and test via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            export PGPASSWORD="or9T#u-x5PZo--"
            DB=$(psql -U postgres -t -A -c "SELECT datname FROM pg_database WHERE datname NOT IN ('postgres','template0','template1') LIMIT 1;")
            echo "DB: $DB"
            PG="psql -U postgres -d $DB -t -A"

            echo "=== All tables ==="
            $PG -c "SELECT tablename FROM pg_tables WHERE schemaname='public' ORDER BY tablename;"

            echo "=== Student tables sample ==="
            $PG -c "SELECT tablename FROM pg_tables WHERE schemaname='public' AND tablename ILIKE '%student%' ORDER BY tablename;"

            echo "=== Ranking-like tables ==="
            $PG -c "SELECT tablename FROM pg_tables WHERE schemaname='public' AND tablename ILIKE '%rank%' ORDER BY tablename;"

            echo "=== Lesson-like tables ==="
            $PG -c "SELECT tablename FROM pg_tables WHERE schemaname='public' AND (tablename ILIKE '%lesson%' OR tablename ILIKE '%exercise%') ORDER BY tablename;"
