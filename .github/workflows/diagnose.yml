name: Diagnose Server

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Patch backend and test via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            BACKEND=/var/www/tech_gennis/backend
            BOT_FILE=$BACKEND/app/api/v1/endpoints/bot_stats.py

            echo "Restoring backup..."
            cp "${BOT_FILE}.bak" "$BOT_FILE" && echo "RESTORED"
            systemctl restart tech_gennis_backend && sleep 3 && systemctl is-active tech_gennis_backend

            echo "ExerciseSubmission columns..."
            grep -A 30 "class ExerciseSubmission" $BACKEND/app/models/exercise.py | head -35
