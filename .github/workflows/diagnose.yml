name: Diagnose Server

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Run diagnostics via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            BACKEND=/var/www/tech_gennis/backend

            echo "=== LessonCompletion model ==="
            cat $BACKEND/app/models/lesson.py

            echo "=== ExerciseSubmission model ==="
            cat $BACKEND/app/models/exercise.py

            echo "=== Ranking model ==="
            cat $BACKEND/app/models/ranking.py

            echo "=== Student model (columns only) ==="
            grep -A2 "Column\|class Student\|group_id\|full_name" $BACKEND/app/models/user.py | head -40

            echo "=== Group model ==="
            cat $BACKEND/app/models/group.py 2>/dev/null | head -40
