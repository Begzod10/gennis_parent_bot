name: Diagnose Server

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Patch backend and test via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            BACKEND=/var/www/tech_gennis/backend
            BOT_FILE=$BACKEND/app/api/v1/endpoints/bot_stats.py
            PATCH=/var/www/gennis_parent_bot/scripts/bot_stats_patch.py

            echo "Apply patch..."
            cp "$PATCH" "$BOT_FILE"
            rm -f $BACKEND/app/api/v1/endpoints/__pycache__/bot_stats*.pyc
            cd $BACKEND && venv/bin/python -m py_compile app/api/v1/endpoints/bot_stats.py && echo "SYNTAX OK"
            systemctl restart tech_gennis_backend && sleep 4 && systemctl is-active tech_gennis_backend

            echo "Test student 28..."
            curl -s "http://localhost:8062/api/v1/bot/student-stats/28" | python3 -c "
import sys, json
d = json.load(sys.stdin)
for k in ['daily_points','daily_lessons','daily_exercises','weekly_points','weekly_lessons','weekly_exercises','monthly_points','monthly_lessons','monthly_exercises','global_rank','weekly_rank','monthly_rank']:
    print(k+':', d.get(k))
"
