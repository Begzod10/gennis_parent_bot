name: Diagnose Server

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Run diagnostics via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            BACKEND=/var/www/tech_gennis/backend

            echo "=== Bot router files ==="
            find $BACKEND -path "*/bot*" -name "*.py" 2>/dev/null
            grep -r "student.stats\|student_stats" $BACKEND --include="*.py" -l 2>/dev/null | head -5

            echo "=== Bot endpoint code ==="
            BOT_FILE=$(grep -r "student.stats\|student_stats" $BACKEND --include="*.py" -l 2>/dev/null | head -1)
            echo "File: $BOT_FILE"
            cat "$BOT_FILE" 2>/dev/null

            echo "=== Models with weekly/attendance/lesson ==="
            grep -r "weekly_points\|attendance\|StudentLesson\|student_lesson\|LessonCompletion" $BACKEND --include="*.py" -l 2>/dev/null | head -5
