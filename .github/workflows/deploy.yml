name: Deploy to Server

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            cd /var/www/gennis_parent_bot

            echo "🐘 Increasing PostgreSQL max_connections to 300..."
            PG_CONF=$(find /etc/postgresql -name "postgresql.conf" 2>/dev/null | head -1)
            if [ -n "$PG_CONF" ]; then
              CURRENT=$(grep "^max_connections" "$PG_CONF" | head -1)
              echo "Current: $CURRENT"
              sed -i "/^max_connections/c\max_connections = 300" "$PG_CONF"
              echo "New: $(grep '^max_connections' "$PG_CONF")"
              systemctl restart postgresql
              sleep 3
              echo "PostgreSQL restarted"
            fi

            echo "🔗 Ensuring TECH_API points to localhost (bypass Cloudflare)..."
            if ! grep -q "^TECH_API=" /var/www/gennis_parent_bot/.env 2>/dev/null; then
              echo "TECH_API=http://localhost:8062/api/v1/bot" >> /var/www/gennis_parent_bot/.env
              echo "Added TECH_API to .env"
            fi

            echo "⬇️ Pulling latest code..."
            git pull origin master

            echo "📦 Installing dependencies..."
            venv/bin/pip install -r requirements.txt -q

            echo "🗄️ Running migrations..."
            venv/bin/alembic upgrade head

            echo "⚙️ Setting up systemd services..."

            # Bot service
            cat > /etc/systemd/system/gennis_parent_bot.service << 'SERVICE'
            [Unit]
            Description=Gennis Parent Bot
            After=network.target postgresql.service redis.service

            [Service]
            Type=simple
            WorkingDirectory=/var/www/gennis_parent_bot
            EnvironmentFile=/var/www/gennis_parent_bot/.env
            ExecStart=/var/www/gennis_parent_bot/venv/bin/python main.py
            Restart=always
            RestartSec=5

            [Install]
            WantedBy=multi-user.target
            SERVICE

            # Celery Beat service
            cat > /etc/systemd/system/gennis_parent_bot_celery.service << 'SERVICE'
            [Unit]
            Description=Gennis Parent Bot - Celery Beat Worker
            After=network.target redis.service postgresql.service

            [Service]
            Type=simple
            WorkingDirectory=/var/www/gennis_parent_bot
            EnvironmentFile=/var/www/gennis_parent_bot/.env
            ExecStart=/var/www/gennis_parent_bot/venv/bin/celery -A app.celery_app worker --beat --loglevel=info
            Restart=always
            RestartSec=5

            [Install]
            WantedBy=multi-user.target
            SERVICE

            systemctl daemon-reload
            systemctl enable gennis_parent_bot gennis_parent_bot_celery

            echo "🔧 Patching tech_gennis backend with weekly/monthly stats..."
            BOT_FILE=/var/www/tech_gennis/backend/app/api/v1/endpoints/bot_stats.py
            PATCH=/var/www/gennis_parent_bot/scripts/bot_stats_patch.py
            if [ -f "$PATCH" ] && [ -f "$BOT_FILE" ]; then
              cp "$PATCH" "$BOT_FILE"
              rm -f /var/www/tech_gennis/backend/app/api/v1/endpoints/__pycache__/bot_stats*.pyc
              systemctl restart tech_gennis_backend
              sleep 3
              echo "Backend patched and restarted"
            fi

            echo "🔄 Restarting services..."
            systemctl restart gennis_parent_bot
            systemctl restart gennis_parent_bot_celery

            echo "✅ Deploy complete!"
            systemctl status gennis_parent_bot --no-pager | head -3
            systemctl status gennis_parent_bot_celery --no-pager | head -3
