name: Diagnose Server

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Run diagnostics via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            echo "=== Find tech_gennis_backend location ==="
            find /var/www /home /opt -maxdepth 3 -name "*.py" 2>/dev/null | xargs grep -l "student.stats\|student_stats" 2>/dev/null | grep -v gennis_parent | head -5

            echo "=== systemctl tech_gennis service ==="
            systemctl cat tech_gennis_backend.service 2>/dev/null | grep -E "WorkingDir|ExecStart" | head -3

            echo "=== Bot student-stats endpoint ==="
            BACKEND_DIR=$(systemctl show tech_gennis_backend -p WorkingDirectory 2>/dev/null | cut -d= -f2)
            echo "Backend at: $BACKEND_DIR"
            find "$BACKEND_DIR" -name "*.py" 2>/dev/null | xargs grep -l "student.stats\|bot" 2>/dev/null | head -5
