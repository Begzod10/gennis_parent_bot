name: Diagnose Server

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Run diagnostics via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            echo "=== Deployed git hash ==="
            cd /var/www/gennis_parent_bot && git log --oneline -3

            echo "=== stream_content in main.py ==="
            grep -n "stream_content\|UNSET\|abstract" /var/www/gennis_parent_bot/main.py || echo "not found"

            echo "=== BaseSession abstract methods ==="
            python3 -c "
            import sys; sys.path.insert(0, '/var/www/gennis_parent_bot')
            import inspect
            from aiogram.client.session.base import BaseSession
            abstracts = [name for name, m in inspect.getmembers(BaseSession) if getattr(m, '__isabstractmethod__', False)]
            print('Abstract methods:', abstracts)
            "

            echo "=== Port 8064 ==="
            ss -tlnp | grep 8064 || echo "NOT listening"

            echo "=== Last 5 bot logs ==="
            journalctl -u gennis_parent_bot -n 5 --no-pager
