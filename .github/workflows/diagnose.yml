name: Diagnose Server

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Patch backend and test via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            export PGPASSWORD="or9T#u-x5PZo--"

            echo "=== All databases ==="
            psql -U postgres -t -A -c "SELECT datname FROM pg_database WHERE datname NOT IN ('template0','template1') ORDER BY datname;"

            echo "=== tech_gennis .env DB URL ==="
            grep -i "database\|db_url\|postgres\|sql" /var/www/tech_gennis/backend/.env 2>/dev/null | head -5
