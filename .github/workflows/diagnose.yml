name: Diagnose Server

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Run diagnostics via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            echo "=== Can server reach Telegram API? ==="
            curl -s --max-time 10 "https://api.telegram.org/bot8678834398:AAFoW10O6qhpTwQiihJ4utC5p573ySCqllo/getMe" && echo "OK" || echo "BLOCKED"

            echo "=== Can server reach tech.gennis.uz (itself via CF)? ==="
            curl -s --max-time 10 "https://tech.gennis.uz/api/v1/bot/search-student?q=test" | head -5

            echo "=== Server IPv6? ==="
            ip -6 addr show | grep "inet6" | grep -v "::1" | head -3 || echo "No IPv6"

            echo "=== Trigger daily report task ==="
            cd /var/www/gennis_parent_bot
            venv/bin/celery -A app.celery_app call app.tasks.send_daily_reports 2>&1

            sleep 15
            echo "=== Celery worker logs ==="
            journalctl -u gennis_parent_bot_celery -n 40 --no-pager
