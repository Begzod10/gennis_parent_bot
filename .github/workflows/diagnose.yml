name: Diagnose Server

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Run diagnostics via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            echo "=== Telegram API ==="
            curl -s --max-time 10 "https://api.telegram.org/bot8678834398:AAFoW10O6qhpTwQiihJ4utC5p573ySCqllo/getMe" && echo "OK" || echo "BLOCKED"

            echo "=== Bot service recent logs ==="
            journalctl -u gennis_parent_bot --since "3 hours ago" --no-pager | grep -E "ERROR|Stats error|Traceback|Exception|stats_error" | tail -20

            echo "=== Reproduce format_stats for student 28 ==="
            cd /var/www/gennis_parent_bot
            cat > /tmp/test_stats.py << 'PYEOF'
            import sys
            sys.path.insert(0, '/var/www/gennis_parent_bot')
            import requests
            from app.config import TECH_API
            from app.handlers.start import format_stats
            try:
                r = requests.get(TECH_API + '/student-stats/28', timeout=10)
                print('HTTP', r.status_code)
                data = r.json()
                print('Courses:', len(data.get('courses', [])))
                result = format_stats(data, 'ru')
                print('OK length:', len(result))
                print(result[:500])
            except Exception as e:
                import traceback
                traceback.print_exc()
            PYEOF
            venv/bin/python /tmp/test_stats.py 2>&1
