name: Diagnose Server

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Run diagnostics via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            echo "=== Deployed git hash ==="
            cd /var/www/gennis_parent_bot && git log --oneline -2

            echo "=== Direct local webhook test ==="
            curl -s -X POST "http://127.0.0.1:8064/parent-webhook" \
              -H "Content-Type: application/json" \
              -d '{"update_id":1,"message":{"message_id":1,"from":{"id":999,"is_bot":false,"first_name":"T","language_code":"ru"},"chat":{"id":999,"type":"private"},"date":1751284000,"text":"/start","entities":[{"offset":0,"length":6,"type":"bot_command"}]}}' \
              -w "\nHTTP: %{http_code}" 2>&1

            echo ""
            echo "=== Bot logs after test ==="
            journalctl -u gennis_parent_bot -n 10 --no-pager

            echo "=== Nginx config for parent-webhook ==="
            grep -r "parent-webhook\|8064" /etc/nginx/ 2>/dev/null || echo "not found"
