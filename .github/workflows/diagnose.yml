name: Diagnose Server

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Run diagnostics via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            BACKEND=/var/www/tech_gennis/backend

            echo "=== bot_stats.py ==="
            cat $BACKEND/app/api/v1/endpoints/bot_stats.py

            echo "=== Models (app/models) ==="
            ls $BACKEND/app/models/ 2>/dev/null || ls $BACKEND/app/db/models/ 2>/dev/null || find $BACKEND/app -name "models.py" -not -path "*/venv/*" | head -3

            echo "=== StudentCourse or StudentLesson model ==="
            grep -r "class Student" $BACKEND/app --include="*.py" -l 2>/dev/null | head -5
